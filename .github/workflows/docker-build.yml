name: Build and Push Docker Image

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update myContainerOSconfig
        if: github.ref == 'refs/heads/main'
        env:
          GH_PAT: ${{ secrets.GH_PAT_VODARR_DEPLOY }}
        run: |
          if [ -z "$GH_PAT" ]; then
            echo "Error: GH_PAT_VODARR_DEPLOY secret is not set!"
            exit 1
          fi

          git config --global user.name "Vodarr CI"
          git config --global user.email "ci@vodarr.local"
          
          # Clone the config repo
          git clone https://x-access-token:${GH_PAT}@github.com/${{ github.repository_owner }}/myContainerOSconfig.git config-repo
          
          cd config-repo
          FILE="applications/applicationset-downloaders/vodarr/values.yaml"
          
          if [ ! -f "$FILE" ]; then
            echo "Error: File $FILE not found in config-repo!"
            exit 1
          fi

          # Update the sync-at annotation
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          sed -i "s/argocd.argoproj.io\/sync-at: .*/argocd.argoproj.io\/sync-at: \"$TIMESTAMP\"/" "$FILE"
          
          git add "$FILE"
          git commit -m "chore(vodarr): auto-update sync-at to $TIMESTAMP [skip ci]"
          git push origin master

